<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini AI TPL FVG</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a; --surface:#131929; --surface2:#1c2540;
  --border:#263050; --accent:#3d7fff; --accent2:#00d4aa;
  --text:#e8edf8; --muted:#6b7fa3;
  --user-bg:#1a2d5a; --ai-bg:#131929;
  --radius:14px;
  --train:#f59e0b; --urbano:#3d7fff; --extra:#10b981; --bus:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 28px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100}
.logo-main{font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:var(--muted);margin-top:1px}
.pill{margin-left:auto;background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;padding:5px 13px;font-size:12px;color:var(--muted);
  font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);
  box-shadow:0 0 8px var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 61px)}

/* SIDEBAR */
aside{width:270px;min-width:200px;background:var(--surface);
  border-right:1px solid var(--border);padding:18px;
  display:flex;flex-direction:column;gap:18px;overflow-y:auto}
aside h3{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:6px}
#status-box{font-size:13px;line-height:1.8}
.row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.row:last-child{border:none}
.val{font-family:'DM Mono',monospace;color:var(--accent2)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;
  font-family:'DM Mono',monospace;margin:2px}
.badge.treno{background:#451a0350;color:var(--train);border:1px solid #f59e0b40}
.badge.urbano{background:#1e3a8a50;color:var(--urbano);border:1px solid #3d7fff40}
.badge.extraurbano{background:#06432a50;color:var(--extra);border:1px solid #10b98140}
.badge.autobus{background:#3b1f7050;color:var(--bus);border:1px solid #a78bfa40}
#linee-list{display:flex;flex-wrap:wrap;gap:4px}
.btn-reload{width:100%;padding:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);border-radius:var(--radius);
  cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;
  transition:all .2s;margin-top:auto}
.btn-reload:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-reload:disabled{opacity:.5;cursor:not-allowed}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#messages{flex:1;overflow-y:auto;padding:24px 28px;
  display:flex;flex-direction:column;gap:18px}
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{max-width:80%;display:flex;flex-direction:column;gap:5px;
  animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.bubble{padding:13px 17px;border-radius:var(--radius);
  font-size:14px;line-height:1.7;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:var(--user-bg);border:1px solid #2a4080;
  border-bottom-right-radius:4px;font-size:15px}
.msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);
  border-bottom-left-radius:4px;font-family:'DM Mono',monospace;font-size:13.5px}
.msg-meta{font-size:11px;color:var(--muted);padding:0 4px}
.msg.user .msg-meta{text-align:right}

/* TYPING */
.typing{display:flex;gap:5px;padding:6px 2px;align-items:center}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* WELCOME */
.welcome{margin:auto;text-align:center;padding:40px 24px;max-width:440px}
.welcome .icon{font-size:54px;margin-bottom:14px}
.welcome h2{font-size:22px;font-weight:800;margin-bottom:8px}
.welcome p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.sug-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 15px;border-radius:999px;font-size:13px;cursor:pointer;
  font-family:'Syne',sans-serif;transition:all .2s}
.sug-btn:hover{background:var(--accent);border-color:var(--accent)}

/* INPUT */
.input-row{padding:14px 24px;background:var(--surface);
  border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
#user-input{flex:1;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:var(--radius);padding:12px 16px;
  font-family:'Syne',sans-serif;font-size:15px;resize:none;
  min-height:48px;max-height:140px;outline:none;transition:border-color .2s}
#user-input:focus{border-color:var(--accent)}
#send-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--radius);
  padding:12px 22px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap}
#send-btn:hover:not(:disabled){background:#2563eb;transform:translateY(-1px)}
#send-btn:disabled{background:var(--surface2);color:var(--muted);
  cursor:not-allowed;transform:none}

/* OVERLAY PER RICARICAMENTO */
#overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  color:#fff;
  font-size:1.2rem;
  display:none;
}
#overlay div{
  background:rgba(0,0,0,0.6);
  padding:20px 30px;
  border-radius:var(--radius);
  text-align:center;
}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-main">🚌 TPL FVG AI</div>
    <div class="logo-sub">Assistente Trasporti Friuli Venezia Giulia</div>
  </div>
  <div class="pill"><span class="dot"></span>llama3:8b</div>
</header>

<main>
  <aside>
    <div>
      <h3>Stato Database</h3>
      <div id="status-box"><span style="color:var(--muted);font-size:13px">Caricamento…</span></div>
    </div>
    <div>
      <h3>Linee Trovate (per tipo)</h3>
      <div id="linee-list"></div>
    </div>
    <button class="btn-reload" id="reload-btn" onclick="doReload()">⟳ Ricarica PDF</button>
  </aside>

  <div class="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="icon">🗺️</div>
        <h2>Ciao! Come posso aiutarti?</h2>
        <p>Chiedimi orari, fermate e linee del trasporto pubblico del Friuli Venezia Giulia.</p>
        <div class="suggestions">
          <button class="sug-btn" onclick="suggest(this)">Quali linee ci sono?</button>
          <button class="sug-btn" onclick="suggest(this)">A che ora passa la linea 10?</button>
          <button class="sug-btn" onclick="suggest(this)">Treni disponibili?</button>
          <button class="sug-btn" onclick="suggest(this)">Bus extraurbani?</button>
          <button class="sug-btn" onclick="suggest(this)">Fermate della linea A?</button>
        </div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="user-input" placeholder="Scrivi la tua domanda…" rows="1"
        onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMsg()">Invia</button>
    </div>
  </div>
</main>

<!-- Overlay per ricaricamento -->
<div id="overlay">
  <div>Ricaricamento delle informazioni, aspettare il completamento</div>
</div>

<script>
const msgBox  = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const overlayEl = document.getElementById('overlay');

let history = [];
let busy    = false;

// ── STATUS ───────────────────────────────────
async function loadStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    const tipiHTML = Object.entries(d.tipi || {})
      .map(([t, n]) => `<span class="badge ${t}">${t}: ${n}</span>`).join('');
    document.getElementById('status-box').innerHTML = `
      <div class="row"><span>Corse totali</span><span class="val">${d.totale_corse}</span></div>
      <div class="row"><span>PDF analizzati</span><span class="val">${(d.pdf_analizzati||[]).length}</span></div>
      <div class="row"><span>Aggiornato</span><span class="val">${(d.generato_il||'').slice(0,10)}</span></div>
      <div style="margin-top:8px">${tipiHTML}</div>`;
    
    // Mostra linee colorate per tipo
    const ll = document.getElementById('linee-list');
    const linee = d.linee || []; // array di oggetti: [{linea: "10", tipo: "urbano"}, ...]
    
    if (linee.length === 0) {
      ll.innerHTML = '<span style="color:var(--muted)">Nessuna linea trovata</span>';
      return;
    }
    
    const lineeDaMostrare = linee.slice(0, 40);
    ll.innerHTML = lineeDaMostrare.map(item => 
      `<span class="badge ${item.tipo}">${item.linea}</span>`
    ).join('');
    
    if (linee.length > 40) {
      ll.innerHTML += `<span class="badge" style="color:var(--muted)">+${linee.length - 40}</span>`;
    }
  } catch {
    document.getElementById('status-box').innerHTML =
      `<span style="color:var(--muted)">Errore caricamento</span>`;
  }
}
loadStatus();

async function doReload() {
  const btn = document.getElementById('reload-btn');
  overlayEl.style.display = 'flex';   // mostra overlay
  btn.disabled = true;
  btn.textContent = '⏳ Ricaricamento…';
  try {
    await fetch('/api/reload', { method: 'POST' });
    await loadStatus();
  } finally {
    overlayEl.style.display = 'none'; // nascondi overlay
    btn.disabled = false;
    btn.textContent = '⟳ Ricarica PDF';
    appendMsg('ai', '✅ Database ricaricato dai PDF.');
  }
}

// ── MESSAGGI ─────────────────────────────────
function ts() {
  return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function appendMsg(role, text) {
  document.getElementById('welcome')?.remove();
  const d = document.createElement('div');
  d.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  d.innerHTML = `
    <div class="bubble">${esc(text)}</div>
    <div class="msg-meta">${role === 'user' ? 'Tu' : 'AI TPL FVG'} · ${ts()}</div>`;
  msgBox.appendChild(d);
  msgBox.scrollTop = msgBox.scrollHeight;
}

// Crea bolla AI con puntini di attesa, ritorna riferimenti alla bolla e al meta
function createAiBubble() {
  document.getElementById('welcome')?.remove();
  const d = document.createElement('div');
  d.className = 'msg ai';
  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'bubble';
  bubbleEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  const metaEl = document.createElement('div');
  metaEl.className = 'msg-meta';
  metaEl.textContent = `AI TPL FVG · ${ts()}`;
  d.appendChild(bubbleEl);
  d.appendChild(metaEl);
  msgBox.appendChild(d);
  msgBox.scrollTop = msgBox.scrollHeight;
  return { bubbleEl, metaEl };
}

// ── SEND ─────────────────────────────────────
async function sendMsg() {
  if (busy) return;
  const msg = inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  autoResize(inputEl);
  appendMsg('user', msg);
  history.push({ role: 'user', content: msg });

  busy = true;
  sendBtn.disabled = true;

  const startTime = performance.now(); // avvio cronometro
  const { bubbleEl, metaEl } = createAiBubble();
  let fullText = '';
  let firstToken = true;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: history.slice(0, -1) }),
    });

    if (!resp.ok) {
      bubbleEl.textContent = `[Errore HTTP ${resp.status}]`;
      fullText = '[Errore]';
    } else {
      const reader = resp.body.getReader();
      const dec    = new TextDecoder();
      let buffer   = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += dec.decode(value, { stream: true });

        // Processa tutte le righe complete nel buffer
        const lines = buffer.split('\n');
        buffer = lines.pop();   // tieni l'ultima riga incompleta nel buffer

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const payload = line.slice(5).trim();
          if (payload === '[DONE]') break;
          try {
            const j = JSON.parse(payload);
            if (j.token) {
              if (firstToken) {
                bubbleEl.textContent = '';   // rimuove i puntini
                firstToken = false;
              }
              fullText += j.token;
              bubbleEl.textContent = fullText;
              msgBox.scrollTop = msgBox.scrollHeight;
            }
          } catch { /* chunk parziale, ignora */ }
        }
      }

      // Processa eventuali dati rimasti nel buffer
      if (buffer.startsWith('data:')) {
        const payload = buffer.slice(5).trim();
        if (payload !== '[DONE]') {
          try {
            const j = JSON.parse(payload);
            if (j.token) {
              if (firstToken) { bubbleEl.textContent = ''; firstToken = false; }
              fullText += j.token;
              bubbleEl.textContent = fullText;
            }
          } catch {}
        }
      }

      // Se non è arrivato nulla, messaggio di errore
      if (firstToken) {
        bubbleEl.textContent = '[Nessuna risposta ricevuta. Controlla che Ollama sia in esecuzione.]';
        fullText = '[Errore]';
      }
    }
  } catch (e) {
    bubbleEl.textContent = `[Errore di connessione: ${e.message}]`;
    fullText = '[Errore]';
  }

  const endTime = performance.now();
  const durationSec = ((endTime - startTime) / 1000).toFixed(1);
  // Aggiorna meta con tempo di risposta
  metaEl.textContent = `AI TPL FVG · ${ts()} · risposta in ${durationSec}s`;

  history.push({ role: 'assistant', content: fullText });
  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function suggest(btn) { inputEl.value = btn.textContent; sendMsg(); }
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
</script>
</body>
</html>
